        const searchViewResults = document.getElementById('search-view-results');
        const visualizerArea = document.getElementById('visualizer');

        let currentHls = null;
        let activeStationId = null;
        let isPlaying = false;
        let userStations = [];
        let vizMode = 'waves';

        // Web Audio API Variables
        let audioCtx = null;
        let analyser = null;
        let source = null;
        let dataArray = null;
        let animationId = null;
        let wakeLock = null;
        let canvas = null;
        let ctx = null;
        let glowLines = [];
        let sharpLines = [];
        let smoothedData = null;
        let eqCaps = new Array(64).fill(0);
        let eqCapVelocity = new Array(64).fill(0);

        const DEFAULT_STATIONS = [
            { id: 'kbs_classic', name: 'KBS 1FM (클래식)', freq: '93.1MHz', url: 'https://radio.bsod.kr/stream/?stn=kbs&ch=1fm', color: '#005bac' },
            { id: 'kbs_cool', name: 'KBS 2FM (쿨FM)', freq: '89.1MHz', url: 'https://radio.bsod.kr/stream/?stn=kbs&ch=2fm', color: '#e30613' },
            { id: 'mbc_sfm', name: 'MBC 표준FM', freq: '95.9MHz', url: 'https://radio.bsod.kr/stream/?stn=mbc&ch=sfm', color: '#e30613' },
            { id: 'sbs_power', name: 'SBS 파워FM', freq: '107.7MHz', url: 'https://radio.bsod.kr/stream/?stn=sbs&ch=powerfm', color: '#00a0e9' }
        ];

        const VERIFIED_KR_STATIONS = [
            { name: "KBS 1라디오", stn: "kbs", ch: "1radio", tags: "뉴스, 시사", freq: "97.3MHz" },
            { name: "KBS 2라디오", stn: "kbs", ch: "2radio", tags: "음악, 토크", freq: "106.1MHz" },
            { name: "KBS 3라디오", stn: "kbs", ch: "3radio", tags: "복지, 뉴스", freq: "104.9MHz" },
            { name: "KBS 1FM (클래식)", stn: "kbs", ch: "1fm", tags: "클래식, 전수", freq: "93.1MHz" },
            { name: "KBS 2FM (쿨FM)", stn: "kbs", ch: "2fm", tags: "대중음악", freq: "89.1MHz" },
            { name: "MBC 표준FM", stn: "mbc", ch: "sfm", tags: "뉴스, 시사", freq: "95.9MHz" },
            { name: "MBC FM4U", stn: "mbc", ch: "fm4u", tags: "음악, 예능", freq: "91.9MHz" },
            { name: "MBC mini 올댓뮤직", stn: "mbc", ch: "chm", tags: "24시간 음악", freq: "디지털" },
            { name: "SBS 러브FM", stn: "sbs", ch: "lovefm", tags: "시사, 가요", freq: "103.5MHz" },
            { name: "SBS 파워FM", stn: "sbs", ch: "powerfm", tags: "음악, 예능", freq: "107.7MHz" },
            { name: "SBS 고릴라디오M", stn: "sbs", ch: "dmb", tags: "24시간 음악", freq: "디지털" },
            { name: "EBS FM", stn: "ebs", ch: "", tags: "교육, 외국어", freq: "104.5MHz" },
            { name: "iFM 경인방송", stn: "ifm", ch: "", tags: "인천 지역 방송", freq: "90.7MHz" },
            { name: "YTN 라디오", stn: "ytn", ch: "", tags: "24시간 뉴스", freq: "94.5MHz" },
            { name: "TBS FM", stn: "tbs", ch: "fm", tags: "교통, 정보", freq: "95.1MHz" },
            { name: "TBS eFM", stn: "tbs", ch: "efm", tags: "영어 방송", freq: "101.3MHz" },
            { name: "TBN 경인교통방송", stn: "tbn", ch: "", tags: "교통 안전", freq: "100.5MHz" },
            { name: "CBS 표준FM", stn: "cbs", ch: "sfm", tags: "시사, 종교", freq: "98.1MHz" },
            { name: "CBS 음악FM", stn: "cbs", ch: "mfm", tags: "음악, 팝, 가요", freq: "93.9MHz" }
        ];

        function init() {
            try { loadStations(); } catch (e) { console.error(e); }
            try { setupEventListeners(); } catch (e) { console.error(e); }
            try { initVisualizer(); } catch (e) { console.error(e); }
            try { updateVisualizerMode(); } catch (e) { console.error(e); }
            try { updateClock(); } catch (e) { console.error(e); }
            setInterval(() => {
                try { updateClock(); } catch (e) { }
            }, 1000);

            // Initialize smoothed data
            smoothedData = new Float32Array(128); // Based on expected fftSize
        }

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            const hoursStr = String(hours).padStart(2, '0');
            const timeHTML = `${ampm} ${hoursStr}<span class="blink-colon">:</span>${minutes}`;
            const clockEl = document.getElementById('header-clock');
            if (clockEl) clockEl.innerHTML = timeHTML;
        }

        function resizeCanvas() {
            if (!canvas) return;
            canvas.width = canvas.offsetWidth * window.devicePixelRatio;
            canvas.height = canvas.offsetHeight * window.devicePixelRatio;
        }

        function initVisualizer() {
            const glowLayer = document.querySelector('.visualizer-glow-layer');
            const sharpLayer = document.querySelector('.visualizer-sharp-layer');
            canvas = document.getElementById('viz-canvas');
            ctx = canvas.getContext('2d');

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            glowLayer.innerHTML = '';
            glowLines = [];
            for (let i = 0; i < 40; i++) { // Increased to fill width
                const line = document.createElement('div');
                line.className = 'glow-line';
                glowLayer.appendChild(line);
                glowLines.push(line);
            }

            sharpLayer.innerHTML = '';
            sharpLines = [];
            for (let i = 0; i < 50; i++) { // Increased to fill width
                const line = document.createElement('div');
                line.className = 'sharp-line';
                sharpLayer.appendChild(line);
                sharpLines.push(line);
            }
        }

        function initAudioContext() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                audio.crossOrigin = "anonymous";
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch (e) {
                console.error("Web Audio API Error:", e);
            }
        }

        function renderFrame() {
            animationId = requestAnimationFrame(renderFrame);
            if (!isPlaying || vizMode === 'off') return;

            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                
                // Apply global temporal smoothing
                if (!smoothedData || smoothedData.length !== dataArray.length) {
                    smoothedData = new Float32Array(dataArray.length);
                }
                for (let i = 0; i < dataArray.length; i++) {
                    smoothedData[i] += (dataArray[i] - smoothedData[i]) * 0.12;
                }
            }
            if (vizMode === 'waves') {
                if (glowLines.length === 0) return;
                const step = Math.floor(dataArray.length / glowLines.length);
                glowLines.forEach((line, i) => {
                    const val = dataArray[i * step] || 0;
                    const height = Math.max(8, (val / 255) * 85);
                    line.style.height = height + '%';
                    line.style.opacity = 0.5 + (val / 255) * 0.5;
                });
            } else if (vizMode !== 'off') {
                if (!ctx) return;
                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;
                ctx.clearRect(0, 0, w, h);

                if (vizMode === 'ring') {
                    const time = Date.now();
                    const bass = (smoothedData[2] / 255);
                    const layerCount = 6;
                    
                    ctx.globalCompositeOperation = 'lighter';
                    
                    const pulseGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, h * 0.4);
                    pulseGlow.addColorStop(0, `hsla(280, 100%, 50%, ${bass * 0.15})`);
                    pulseGlow.addColorStop(1, 'transparent');
                    ctx.fillStyle = pulseGlow;
                    ctx.fillRect(0, 0, w, h);

                    for (let l = 0; l < layerCount; l++) {
                        const segments = 120;
                        const layerPhase = l * (Math.PI / 3);
                        const hue = (280 + l * 20 + time * 0.01) % 360; 
                        const opacity = 0.3 + (1 - l / layerCount) * 0.5;
                        
                        ctx.beginPath();
                        ctx.lineWidth = 1.5 + (1 - l / layerCount) * 4;
                        ctx.strokeStyle = `hsla(${hue}, 100%, 75%, ${opacity})`;
                        ctx.shadowBlur = 10 + bass * 25;
                        ctx.shadowColor = `hsla(${hue}, 100%, 50%, 0.5)`;
                        
                        for (let i = 0; i <= segments; i++) {
                            const angle = (i / segments) * Math.PI * 2;
                            const freqIdx = Math.floor(Math.abs(Math.sin(angle * 2)) * 30 + l * 5) % smoothedData.length;
                            const audioVal = (smoothedData[freqIdx] / 255);
                            
                            const warp = Math.sin(angle * 4 + time * 0.002 + layerPhase) * 15 +
                                        Math.sin(angle * 8 - time * 0.003) * 10 +
                                        Math.sin(angle * 3 + time * 0.001) * 20;
                                        
                            const radius = (h * 0.25) + (audioVal * h * 0.15) + (warp * (0.5 + bass));
                            const x = cx + Math.cos(angle) * radius;
                            const y = cy + Math.sin(angle) * radius;
                            
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        ctx.stroke();
                        
                        if (l % 2 === 0) {
                            ctx.globalAlpha = 0.05 * opacity;
                            ctx.fill();
                            ctx.globalAlpha = 1.0;
                        }
                    }
                    ctx.shadowBlur = 0;
                    ctx.globalCompositeOperation = 'source-over';
                } else if (vizMode === 'cyber') {
                    const time = Date.now();
                    const lineCount = 3;
                    const baseHue = 210;
                    const bass = (smoothedData[2] / 255);

                    for (let l = 0; l < lineCount; l++) {
                        const layerOffset = l * 0.5;
                        const opacity = 0.6 - (l * 0.15);
                        ctx.beginPath();
                        ctx.strokeStyle = `hsla(${baseHue + l * 20}, 90%, 65%, ${opacity})`;
                        ctx.lineWidth = 2 + (lineCount - l) + (bass * 5);

                        const sliceWidth = w / (smoothedData.length / 4);
                        let x = 0;

                        for (let i = 0; i < smoothedData.length / 4; i++) {
                            const val = (smoothedData[i] / 255.0);
                            const shift = Math.sin(i * 0.2 + time * 0.004 + layerOffset) * (val * h * 0.3);
                            const y = h / 2 + shift;

                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                            x += sliceWidth;
                        }
                        ctx.stroke();
                        ctx.shadowBlur = 10 + bass * 20;
                        ctx.shadowColor = `hsla(${baseHue + l * 20}, 90%, 65%, 0.5)`;
                    }
                    ctx.shadowBlur = 0;
                } else if (vizMode === 'mono') {
                    const step = Math.ceil(w / 64);
                    const bass = (smoothedData[2] / 255);
                    
                    for (let x = 0; x < w; x += step) {
                        const i = Math.floor((x / w) * 64);
                        const val = smoothedData[i] || 0;
                        const barH = (val / 255) * h * 0.75;
                        const hue = (i / 64) * 360 + (bass * 50);
                        
                        ctx.fillStyle = `hsla(${hue}, 100%, 60%, 0.8)`;
                        ctx.shadowBlur = 10 + (val/255)*15;
                        ctx.shadowColor = `hsla(${hue}, 100%, 50%, 0.6)`;
                        ctx.fillRect(x, h - barH, step - 1, barH);
                        
                        if (barH > eqCaps[i]) {
                            eqCaps[i] = barH;
                            eqCapVelocity[i] = 0;
                        } else {
                            eqCapVelocity[i] += 0.4;
                            eqCaps[i] -= eqCapVelocity[i];
                            if (eqCaps[i] < 0) eqCaps[i] = 0;
                        }
                        
                        ctx.fillStyle = '#fff';
                        ctx.shadowBlur = 15; ctx.shadowColor = '#fff';
                        ctx.fillRect(x, h - eqCaps[i] - 3, step - 1, 3);
                        
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = `hsla(${hue}, 100%, 60%, 0.2)`;
                        ctx.fillRect(x, h - barH - 12, step - 1, 6);
                    }
                    ctx.shadowBlur = 0;
                } else if (vizMode === 'fire_wave') {
                    const time = Date.now();
                    const lineCount = 20;
                    const bass = (smoothedData[2] / 255);

                    ctx.save();
                    ctx.lineJoin = 'round';

                    for (let l = 0; l < lineCount; l++) {
                        const z = 1 - (l / lineCount);
                        const opacity = Math.pow(z, 1.5) * 0.7;
                        const hue = 280 - (z * 100);
                        const lightness = 50 + (z * 20);

                        ctx.beginPath();
                        ctx.strokeStyle = `hsla(${hue}, 100%, ${lightness}%, ${opacity})`;
                        ctx.lineWidth = 1 + (z * 3);

                        const vanishingX = w;
                        const segments = 120;
                        const stepX = w / segments;

                        for (let i = 0; i <= segments; i++) {
                            const prog = i / segments;
                            const depthFac = 1 - prog; 
                            const freqIdx = Math.floor(z * 40 + i * 0.2) % smoothedData.length;
                            const val = (smoothedData[freqIdx] / 255);
                            const wave = Math.sin(i * 0.15 - time * 0.005 + l * 0.3) * (val * h * 0.45 * depthFac * z);
                            const posX = i * stepX;
                            const posY = cy + wave;
                            const finalX = posX * (1 - prog) + vanishingX * prog;
                            const finalY = posY * (1 - prog) + cy * prog;

                            if (i === 0) ctx.moveTo(finalX, finalY);
                            else ctx.lineTo(finalX, finalY);
                        }
                        ctx.stroke();
                        
                        if (bass > 0.8 && l > lineCount - 5) {
                            ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
                            ctx.stroke();
                            ctx.shadowBlur = 0;
                        }
                    }
                    ctx.restore();
                }
            }
        }

        function loadStations() {
            const saved = localStorage.getItem('radio_stations');
            userStations = saved ? JSON.parse(saved) : [...DEFAULT_STATIONS];
            renderStations();
            renderSearchList();
        }

        function renderStations() {
            if (userStations.length === 0) {
                stationList.innerHTML = `<div class="p-8 text-center opacity-40 text-sm">즐겨찾기한 방송이 없습니다.</div>`;
                return;
            }
            stationList.innerHTML = userStations.map(s => `
                <div id="item-${s.id}" class="station-card ${s.id === activeStationId ? 'active' : ''}" onclick="selectStation('${s.id}')">
                    <div class="station-badge">${s.freq.replace('MHz', '')}</div>
                    <div class="flex-grow min-w-0">
                        <h3 class="font-semibold text-slate-100 truncate">${s.name}</h3>
                        <p class="text-[10px] text-slate-400 uppercase tracking-tighter truncate">Favorite Station</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <button class="p-2 text-brand-accent hover:scale-110 active:scale-95 transition-all" onclick="window.removeStation(event, '${s.id}')" title="삭제">
                            <svg class="h-5 w-5 fill-current" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderSearchList() {
            searchViewResults.innerHTML = VERIFIED_KR_STATIONS.map(s => {
                const url = `https://radio.bsod.kr/stream/?stn=${s.stn}${s.ch ? '&ch=' + s.ch : ''}`;
                const isSaved = userStations.some(us => us.url === url);
                const sData = encodeURIComponent(JSON.stringify({ name: s.name, url: url, freq: s.freq }));
                const freqText = s.freq.replace('MHz', '');
                return `
                    <div class="station-card" onclick="window.previewStation('${url}', '${s.name}', '${s.freq}')">
                        <div class="station-badge">${freqText}</div>
                        <div class="flex-grow min-w-0">
                            <h3 class="font-semibold text-slate-100 truncate">${s.name}</h3>
                            <p class="text-[10px] text-slate-400 uppercase tracking-tighter truncate">${s.tags}</p>
                        </div>
                        <div class="flex items-center gap-1">
                            <button class="p-2 text-brand-primary hover:scale-110 active:scale-95 transition-all" title="재생">
                                <svg class="h-5 w-5 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                            <button class="p-2 ${isSaved ? 'text-brand-accent' : 'text-slate-500'} hover:scale-110 active:scale-95 transition-all" onclick="window.toggleFavorite(event, '${sData}')" title="즐겨찾기">
                                ${isSaved ?
                        `<svg class="h-5 w-5 fill-current" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>` :
                        `<svg class="h-5 w-5 fill-none stroke-current" stroke-width="2" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`
                    }
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setupEventListeners() {
            playBtn.addEventListener('click', togglePlay);
            syncBtn.addEventListener('click', synchronizeStreams);

            // v1.2.0: Optimized Click Interaction for Top-Section Visualization Toggle
            window.addEventListener('click', (e) => {
                const nowPlayingSection = document.querySelector('section');

                // Toggle ONLY if clicked inside Now Playing section but NOT on buttons/cards/interactive elements
                if (nowPlayingSection && nowPlayingSection.contains(e.target)) {
                    if (!e.target.closest('button') && !e.target.closest('.station-card')) {
                        cycleVisualizerMode();
                    }
                }
            });
        }

        function cycleVisualizerMode() {
            const modes = ['waves', 'ring', 'cyber', 'mono', 'fire_wave', 'off'];
            const modeNames = {
                'waves': '🌊 파동',
                'ring': '🥯 고리',
                'cyber': '🌐 사이버',
                'mono': '🌌 모노',
                'fire_wave': '🌀 코스믹',
                'off': '🌑 끄기'
            };
            vizMode = modes[(modes.indexOf(vizMode) + 1) % modes.length];
            showToast(`시각화: ${modeNames[vizMode]}`);
            updateVisualizerMode();
        }

        function updateVisualizerMode() {
            const glow = document.querySelector('.visualizer-glow-layer');
            const sharp = document.querySelector('.visualizer-sharp-layer');
            const cvsLayer = document.getElementById('viz-canvas');

            glow.style.display = vizMode === 'waves' ? 'flex' : 'none';
            sharp.style.display = 'none'; // Spectrum removed
            cvsLayer.style.display = (vizMode === 'cyber' || vizMode === 'ring' || vizMode === 'mono' || vizMode === 'fire_wave') ? 'block' : 'none';

            if (vizMode === 'cyber' || vizMode === 'ring' || vizMode === 'mono' || vizMode === 'fire_wave') setTimeout(resizeCanvas, 10);
        }

        function selectStation(id) {
            const station = userStations.find(s => s.id === id);
            if (!station) return;
            activeStationId = id;
            freqDisplay.textContent = station.freq.replace('MHz', '') || '--.-';
            nameDisplay.textContent = 'CONNECTING...';
            renderStations();
            loadStream(station.url, station);
        }

        function loadStream(url, station) {
            if (currentHls) currentHls.destroy();
            if (Hls.isSupported()) {
                currentHls = new Hls();
                currentHls.loadSource(url);
                currentHls.attachMedia(audio);
                currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                    nameDisplay.textContent = station.name;
                    playAudio();
                });
            } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
                audio.src = url;
                audio.addEventListener('loadedmetadata', () => {
                    nameDisplay.textContent = station.name;
                    playAudio();
                });
            }
        }

        function togglePlay() {
            if (isPlaying) pauseAudio();
            else playAudio();
        }

        function playAudio() {
            if (!audio.src && !currentHls) return;
            initAudioContext();
            if (audioCtx?.state === 'suspended') audioCtx.resume();
            audio.play().then(() => {
                isPlaying = true;
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                // Trigger visualizer auto-start logic
                if (!animationId) renderFrame();
                // Ensure viz mode is not 'off' if we want it auto-on
                if (vizMode === 'off') {
                    vizMode = 'waves';
                    updateVisualizerMode();
                }
            }).catch(e => console.error(e));
        }

        function pauseAudio() {
            audio.pause();
            isPlaying = false;
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        }

        async function synchronizeStreams() {
            if (syncBtn.classList.contains('spinning')) return;
            syncBtn.classList.add('spinning');
            showToast('방송 리스트 동기화 중...');
            await new Promise(r => setTimeout(r, 1500));
            loadStations();
            syncBtn.classList.remove('spinning');
            showToast('✅ 업데이트 완료', 'success');
        }

        function showToast(message, type = '') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toast-out 0.4s forwards';
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            // Home is block, Search is flex (to fill column)
            const targetPage = document.getElementById(`page-${id}`);
            targetPage.style.display = 'flex';

            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(id));
            });
        };

        window.previewStation = (url, name, freq) => {
            activeStationId = 'preview';
            freqDisplay.textContent = freq ? freq.replace('MHz', '') : '--.-';
            nameDisplay.textContent = 'CONNECTING...';
            loadStream(url, { name });
        };

        window.toggleFavorite = (e, sEncoded) => {
            e.stopPropagation();
            const s = JSON.parse(decodeURIComponent(sEncoded));
            const idx = userStations.findIndex(us => us.name === s.name);
            if (idx > -1) userStations.splice(idx, 1);
            else userStations.push({ id: 'fav_' + Date.now(), name: s.name, freq: s.freq, url: s.url });
            localStorage.setItem('radio_stations', JSON.stringify(userStations));
            renderStations();
            renderSearchList();
        };

        window.removeStation = (e, id) => {
            e.stopPropagation();
            userStations = userStations.filter(us => us.id !== id);
            localStorage.setItem('radio_stations', JSON.stringify(userStations));
            renderStations();
            renderSearchList(); // Sync search list heart state too
        };

        window.addEventListener('load', init);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=29').then(() => console.log('SW Registered'));
        }
    </script>
</body>

</html>
